<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PhysiForge – Photoelectric Effect</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {
  margin: 0;
  background: #020a12;
  color: white;
  font-family: monospace;
}
button {
  cursor: pointer;
}
.panel {
  background: #030d16;
  border: 1px solid #0d2535;
  border-radius: 8px;
  padding: 10px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useRef, useMemo } = React;

// ================= PHYSICS =================
const h = 4.136e-3; // eV·THz

const METALS = {
  sodium: { phi: 2.28 },
  zinc: { phi: 4.3 },
};

function physics(f, I, V, metal){
  const phi = METALS[metal].phi;
  const E = h * f;
  const emitting = E >= phi;
  const KE = emitting ? E - phi : 0;
  return { emitting, KE, phi, E };
}

// ================= ELECTRONS =================
function useElectrons(emitting, KE, V, onHit){
  const [els, setEls] = useState([]);

  useEffect(()=>{
    let raf;

    const loop = ()=>{
      raf = requestAnimationFrame(loop);

      setEls(prev=>{
        let hits = 0;

        let next = prev.map(e=>{
          const vx = e.vx + V*0.02;
          const x = e.x + vx;

          if(x > 350 && vx > 0){
            hits++;
            return null;
          }

          return {...e, x, vx, life:e.life-1};
        }).filter(e=>e && e.life>0);

        if(hits>0) onHit(hits);

        if(emitting){
          next.push({
            x:150,
            y:100+Math.random()*40-20,
            vx:Math.sqrt(KE+0.1)*2,
            life:100
          });
        }

        return next;
      });
    };

    raf = requestAnimationFrame(loop);
    return ()=>cancelAnimationFrame(raf);
  },[emitting, KE, V]);

  return els;
}

// ================= MAIN =================
function App(){

  const [f,setF]=useState(600);
  const [I,setI]=useState(50);
  const [V,setV]=useState(0);
  const [metal,setMetal]=useState("sodium");

  const [hits,setHits]=useState([]);
  const [step,setStep]=useState(0);

  const phys = physics(f,I,V,metal);

  const onHit = (n)=>{
    const now = performance.now();
    setHits(prev => [...prev.filter(t=>now-t<500), ...Array(n).fill(now)]);
  };

  const current = useMemo(()=>{
    return (hits.length/0.5)*0.1;
  },[hits]);

  const electrons = useElectrons(phys.emitting, phys.KE, V, onHit);

  // ================= LEARNING STEPS =================
  const steps = [
    {
      text:"Increase frequency until electrons start emitting",
      done: phys.emitting
    },
    {
      text:"Increase intensity → current should increase",
      done: current > 2
    },
    {
      text:"Apply negative voltage → stop current",
      done: current === 0 && V < 0
    }
  ];

  useEffect(()=>{
    if(step < steps.length && steps[step].done){
      setStep(step+1);
    }
  },[phys,current,V]);

  return(
    <div style={{padding:20}}>

      <h2 style={{color:"#00e5ff"}}>PHYSIFORGE – MODERN PHYSICS</h2>
      <h3>Photoelectric Effect Lab</h3>

      {/* TASK PANEL */}
      <div className="panel" style={{marginBottom:15}}>
        <b>Experiment Tasks</b>
        {steps.map((s,i)=>(
          <div key={i} style={{color:i<step?"#00ff88":"#888"}}>
            {i<step?"✔":"⬜"} {s.text}
          </div>
        ))}
      </div>

      {/* CONTROLS */}
      <div className="panel">
        Frequency: {f}
        <input type="range" min="400" max="800" value={f} onChange={e=>setF(+e.target.value)}/>

        Intensity: {I}
        <input type="range" min="0" max="100" value={I} onChange={e=>setI(+e.target.value)}/>

        Voltage: {V.toFixed(1)}
        <input type="range" min="-5" max="5" step="0.1" value={V} onChange={e=>setV(+e.target.value)}/>
      </div>

      {/* APPARATUS */}
      <svg width="500" height="200" style={{marginTop:20}}>
        <rect x="150" y="50" width="10" height="100" fill="yellow"/>
        <rect x="350" y="50" width="10" height="100" fill="cyan"/>

        {electrons.map((e,i)=>(
          <circle key={i} cx={e.x} cy={e.y} r="3" fill="cyan"/>
        ))}
      </svg>

      {/* READOUT */}
      <div className="panel" style={{marginTop:15}}>
        Energy: {phys.E.toFixed(2)} eV<br/>
        Work Function: {phys.phi} eV<br/>
        KE: {phys.KE.toFixed(2)} eV<br/>
        <span style={{color: current>0?"#00ff88":"#555"}}>
          Current: {current.toFixed(2)} μA
        </span>
      </div>

      {/* COMPLETION */}
      {step===steps.length && (
        <div style={{marginTop:15,color:"#00ff88"}}>
          🎉 Experiment Complete!
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
