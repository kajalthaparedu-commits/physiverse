<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photoelectric Effect</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
margin:0;
background:#020a12;
color:white;
font-family:monospace;
}
.panel{
background:#030d16;
border:1px solid #0d2535;
border-radius:8px;
padding:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect,useMemo} = React;

const h = 4.136e-3;

const METALS = {
  sodium:{phi:2.28},
  zinc:{phi:4.3}
};

function physics(f,metal){
  const phi = METALS[metal].phi;
  const E = h*f;
  const emitting = E>=phi;
  const KE = emitting?E-phi:0;
  return {E,phi,KE,emitting};
}

function useElectrons(emitting,KE,V,onHit){
  const [els,setEls]=useState([]);

  useEffect(()=>{
    let raf;

    const loop=()=>{
      raf=requestAnimationFrame(loop);

      setEls(prev=>{
        let hits=0;

        let next=prev.map(e=>{
          const vx=e.vx+V*0.02;
          const x=e.x+vx;

          if(x>350 && vx>0){
            hits++;
            return null;
          }

          return {...e,x,vx,life:e.life-1};
        }).filter(e=>e && e.life>0);

        if(hits>0) onHit(hits);

        if(emitting){
          next.push({
            x:150,
            y:100+Math.random()*40-20,
            vx:Math.sqrt(KE+0.1)*2,
            life:100
          });
        }

        return next.slice(-60);
      });
    };

    raf=requestAnimationFrame(loop);
    return ()=>cancelAnimationFrame(raf);
  },[emitting,KE,V]);

  return els;
}

function App(){

  const [f,setF]=useState(600);
  const [I,setI]=useState(50);
  const [V,setV]=useState(0);
  const [metal,setMetal]=useState("sodium");

  const [hits,setHits]=useState([]);
  const [step,setStep]=useState(0);

  const phys=physics(f,metal);

  const onHit=(n)=>{
    const now=performance.now();
    setHits(prev=>[
      ...prev.filter(t=>now-t<500),
      ...Array(n).fill(now)
    ]);
  };

  const current=useMemo(()=>{
    return (hits.length/0.5)*0.1;
  },[hits]);

  const electrons=useElectrons(phys.emitting,phys.KE,V,onHit);

  const steps=[
    {text:"Increase frequency until emission",done:phys.emitting},
    {text:"Increase intensity → current increases",done:current>2},
    {text:"Apply negative voltage → stop current",done:current===0 && V<0}
  ];

  useEffect(()=>{
    if(step<steps.length && steps[step].done){
      setStep(step+1);
    }
  },[phys,current,V]);

  return(
    <div style={{padding:20}}>

      <h2 style={{color:"#00e5ff"}}>PHOTOELECTRIC EFFECT</h2>

      <div className="panel">
        <b>Tasks</b>
        {steps.map((s,i)=>(
          <div key={i} style={{color:i<step?"#00ff88":"#888"}}>
            {i<step?"✔":"⬜"} {s.text}
          </div>
        ))}
      </div>

      <div className="panel">
        Frequency: {f}
        <input type="range" min="400" max="800" value={f} onChange={e=>setF(+e.target.value)}/>

        Intensity: {I}
        <input type="range" min="0" max="100" value={I} onChange={e=>setI(+e.target.value)}/>

        Voltage: {V.toFixed(1)}
        <input type="range" min="-5" max="5" step="0.1" value={V} onChange={e=>setV(+e.target.value)}/>
      </div>

      <svg width="500" height="200">
        <rect x="150" y="50" width="10" height="100" fill="yellow"/>
        <rect x="350" y="50" width="10" height="100" fill="cyan"/>
        {electrons.map((e,i)=>(
          <circle key={i} cx={e.x} cy={e.y} r="3" fill="cyan"/>
        ))}
      </svg>

      <div className="panel">
        Energy: {phys.E.toFixed(2)} eV<br/>
        Work Function: {phys.phi} eV<br/>
        KE: {phys.KE.toFixed(2)} eV<br/>
        Current: {current.toFixed(2)} μA
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
